name: 构建 Startool APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: 检查 Flutter 版本
        run: |
          echo "===== Flutter 版本 ====="
          flutter --version
          echo "===== 版本检查完毕 ====="

      - name: 安装依赖
        run: |
          echo "===== 安装依赖 ====="
          flutter pub get
          echo "===== 依赖安装完毕 ====="

      - name: 构建 APK
        run: |
          echo "===== 开始构建 APK ====="
          echo "正在编译代码并打包，预计需要 1-3 分钟..."
          flutter build apk --release
          echo "===== 构建完成 ====="

      - name: 检查构建产物
        run: |
          echo "===== 正在检查 APK 文件 ====="
          ls -lh build/app/outputs/flutter-apk/*.apk 2>/dev/null || echo "警告：未找到 APK 文件"
          echo "===== 检查完毕 ====="

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: startool-release
          path: build/app/outputs/flutter-apk/*.apk
