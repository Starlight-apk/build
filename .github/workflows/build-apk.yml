name: 构建 APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: 安装依赖
        run: flutter pub get

      - name: 构建 APK
        run: flutter build apk --debug

      - name: 删除旧 Release
        run: |
          gh release delete dev --cleanup-tag --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 创建 Release 并上传 APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev
          name: "StarTool Dev Build"
          body: |
            ## StarTool 开发版
            
            自动构建于 ${{ github.sha }}
            
            包含功能：
            - 概览页（CPU、RAM、磁盘、GPU 概览）
            - 工具箱（系统信息、性能监控、网络工具等）
            - 设置页（深色模式、主题颜色）
            - 关于页（版本信息、团队信息）
          files: build/app/outputs/flutter-apk/*.apk
          prerelease: true
          fail_on_unmatched_files: false
