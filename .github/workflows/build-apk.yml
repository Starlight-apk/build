name: 构建 APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - name: 安装依赖
        run: flutter pub get

      - name: 生成固定调试签名
        run: |
          echo "===== 生成固定调试签名 ====="
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore -keyalg RSA -keysize 2048 -validity 10000 \
            -alias androiddebugkey -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
          echo "===== 签名生成完毕 ====="

      - name: 生成 Android 配置
        run: flutter create --project-name startool --org com.starpak .

      - name: 替换应用图标
        run: |
          echo "===== 替换应用图标 ====="
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp assets/ic_launcher.png android/app/src/main/res/$dir/ic_launcher.png
            cp assets/ic_launcher_round.png android/app/src/main/res/$dir/ic_launcher_round.png
          done
          cp assets/ic_launcher_foreground.png android/app/src/main/res/drawable/ic_launcher_foreground.png
          echo "===== 图标替换完毕 ====="

      - name: 设置启动闪屏（显示图标）
        run: |
          echo "===== 设置启动闪屏 ====="
          mkdir -p android/app/src/main/res/drawable
          cat > android/app/src/main/res/drawable/splash_screen.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/black" />
              <item
                  android:width="96dp"
                  android:height="96dp"
                  android:gravity="center">
                  <bitmap android:src="@mipmap/ic_launcher" />
              </item>
              <item
                  android:width="200dp"
                  android:height="4dp"
                  android:gravity="center|bottom"
                  android:bottom="64dp">
                  <inset xmlns:android="http://schemas.android.com/apk/res/android"
                      android:drawable="@android:drawable/progress_horizontal"
                      android:insetLeft="0dp"
                      android:insetRight="0dp"
                      android:insetTop="0dp"
                      android:insetBottom="0dp" />
              </item>
          </layer-list>
          EOF
          cat > android/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="LaunchTheme" parent="android:Theme.Material.Light.NoActionBar">
                  <item name="android:windowBackground">@drawable/splash_screen</item>
                  <item name="android:statusBarColor">#1C1B1F</item>
                  <item name="android:navigationBarColor">#1C1B1F</item>
              </style>
          </resources>
          EOF
          echo "===== 启动闪屏设置完毕 ====="

      - name: 添加原生启动页面（SplashActivity）
        run: |
          echo "===== 添加原生启动页 ====="
          mkdir -p android/app/src/main/java/com/starpak/startool
          cat > android/app/src/main/java/com/starpak/startool/SplashActivity.java << 'EOF'
          package com.starpak.startool;

          import android.content.Intent;
          import android.os.Bundle;
          import android.os.Handler;
          import android.app.Activity;
          import android.widget.ProgressBar;
          import android.widget.ImageView;
          import android.widget.LinearLayout;

          public class SplashActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);

                  LinearLayout layout = new LinearLayout(this);
                  layout.setBackgroundColor(0xFF1C1B1F);
                  layout.setOrientation(LinearLayout.VERTICAL);
                  layout.setGravity(android.view.Gravity.CENTER);

                  ImageView icon = new ImageView(this);
                  icon.setImageResource(R.mipmap.ic_launcher);
                  LinearLayout.LayoutParams iconParams = new LinearLayout.LayoutParams(192, 192);
                  icon.setLayoutParams(iconParams);

                  ProgressBar progress = new ProgressBar(this, null, android.R.attr.progressBarStyleHorizontal);
                  LinearLayout.LayoutParams progParams = new LinearLayout.LayoutParams(400, 12);
                  progParams.topMargin = 64;
                  progress.setLayoutParams(progParams);
                  progress.setIndeterminate(true);

                  layout.addView(icon);
                  layout.addView(progress);
                  setContentView(layout);

                  new Handler().postDelayed(() -> {
                      startActivity(new Intent(SplashActivity.this, MainActivity.class));
                      finish();
                  }, 500);
              }
          }
          EOF
          echo "===== 原生启动页添加完毕 ====="

      - name: 覆盖 AndroidManifest（SplashActivity 为启动页）
        run: |
          echo "===== 覆盖 AndroidManifest ====="
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <application
                  android:label="Startool"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher_round">
                  <activity
                      android:name=".SplashActivity"
                      android:exported="true"
                      android:theme="@style/LaunchTheme">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <activity
                      android:name=".MainActivity"
                      android:exported="false" />
              </application>
          </manifest>
          EOF
          echo "===== AndroidManifest 覆盖完毕 ====="

      - name: 构建 APK (arm64-v8a)
        run: flutter build apk --debug --target-platform android-arm64

      - name: 删除旧 Release
        run: |
          gh release delete dev --cleanup-tag --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: 创建 Release 并上传 APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: dev
          name: "StarTool Dev Build"
          body: |
            ## StarTool 开发版
            
            自动构建于 ${{ github.sha }}
            
            包含功能：
            - 概览页（CPU、RAM、磁盘、GPU 概览）
            - 工具箱（系统信息、性能监控、网络工具等）
            - 设置页（深色模式、主题颜色）
            - 关于页（版本信息、团队信息）
          files: build/app/outputs/flutter-apk/*.apk
          prerelease: true
          fail_on_unmatched_files: false
